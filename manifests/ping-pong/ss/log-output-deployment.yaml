apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  namespace: exercises
  name: log-output-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output-app
  strategy:
    canary:
      steps:
      - setWeight: 50
      - analysis:
          templates:
          - templateName: cpu-usage
  template:
    metadata:
      labels:
        app: log-output-app
    spec:
      volumes:
        - name: config-volume
          configMap:
            name: apps-configmap
      containers:
        - name: log-output-app
          image: europe-north1-docker.pkg.dev/dwk-gke-485610/my-repo/log-output-app:2.7
          imagePullPolicy: Always
          readinessProbe:
            initialDelaySeconds: 20
            periodSeconds: 5
            httpGet:
              path: /
              port: 9090
          livenessProbe:
            initialDelaySeconds: 20
            periodSeconds: 5 # How often to test
            httpGet:
               path: /
               port: 9090
          volumeMounts:
            - name: config-volume
              mountPath: /config
          env:
          - name: MESSAGE
            valueFrom:
              configMapKeyRef:
                name: apps-configmap
                key: MESSAGE
          - name: PORT
            valueFrom:
              configMapKeyRef:
                name: apps-configmap
                key: PORT