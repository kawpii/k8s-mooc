apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ping-pong-app-dep
  namespace: exercises
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong-app
  strategy:
    canary:
      steps:
      - setWeight: 50
      - analysis:
          templates:
          - templateName: cpu-usage
  template:
    metadata:
      labels:
        app: ping-pong-app
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z postgres-svc 5432; do
                echo "waiting for postgres..."
                sleep 2
              done
      volumes:
        - name: config-volume
          configMap:
            name: apps-configmap
      containers:
        - name: ping-pong-app
          image: europe-north1-docker.pkg.dev/dwk-gke-485610/my-repo/ping-pong-app:3.4
          imagePullPolicy: Always
          readinessProbe:
            initialDelaySeconds: 20
            periodSeconds: 5
            httpGet:
              path: /
              port: 9090
          livenessProbe:
            initialDelaySeconds: 20
            periodSeconds: 5 # How often to test
            httpGet:
               path: /
               port: 9090
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: apps-configmap
                  key: DATABASE_URL
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: apps-configmap
                  key: PORT