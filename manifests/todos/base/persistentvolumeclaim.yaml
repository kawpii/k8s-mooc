apiVersion: v1
kind: PersistentVolume
metadata:
  name: gcs-fuse-pv
spec:
  accessModes:
  - ReadWriteMany
  capacity:
    storage: 5Gi # This value is ignored by GCS, but required by K8s
  storageClassName: "" # Keep empty
  claimRef:
    namespace: project
    name: images-claim
  csi:
    driver: gcsfuse.csi.storage.gke.io
    volumeHandle: pg-backups-dwk-gke-485610
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: project
  name: images-claim
spec:
  storageClassName: ""
  accessModes:
    - ReadWriteMany
  volumeName: gcs-fuse-pv
  resources:
    requests:
      storage: 1Gi