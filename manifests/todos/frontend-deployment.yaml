apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: project
  name: frontend-app-dep
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-frontend-app
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: todo-frontend-app
      annotations:
        gke-gcsfuse/volumes: "true" # Required for GCS FUSE
        gke-gcsfuse/cpu-request: "10m"
        gke-gcsfuse/memory-request: "64Mi"
        gke-gcsfuse/ephemeral-storage-request: "50Mi"
    spec:
      serviceAccountName: postgres-backup-sa # Use a SA that has GCS permissions
      volumes:
        - name: shared-images
          persistentVolumeClaim:
            claimName: images-claim
      containers:
        - name: todo-frontend-app
          image: frontend-image
          imagePullPolicy: Always
          readinessProbe:
            initialDelaySeconds: 10 # Initial delay until the readiness is tested
            periodSeconds: 5 # How often to test
            httpGet:
               path: /healthz
               port: 8080
          livenessProbe:
            initialDelaySeconds: 20 # Initial delay until the liveness is tested
            periodSeconds: 5 # How often to test
            httpGet:
               path: /healthz
               port: 8080
          resources:
            limits:
              memory: "128Mi"
              cpu: "100m"
            requests:
              memory: "64Mi"
              cpu: "50m"
          env:
          - name: PORT
            valueFrom:
              configMapKeyRef:
                name: todo-configmap
                key: FRONTEND_PORT
          - name: BACKEND_URL
            valueFrom:
              configMapKeyRef:
                name: todo-configmap
                key: BACKEND_URL
          volumeMounts:
          - name: shared-images
            mountPath: /cache